<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo iframes hoteles</title>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#eef2f3;color:#12202b}
    header{padding:20px;background:#12202b;color:white;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    button{border:0;border-radius:10px;padding:11px 14px;cursor:pointer;font-weight:700;background:#f6c029;color:#12202b;margin:4px}
    iframe{width:100%;height:760px;border:0;background:white;display:block}
    .hint{font-size:13px;opacity:.85}
  </style>
</head>
<body>
  <header>
    <div>
      <h2 style="margin:0 0 6px">Simulación local de webreservas por hotel</h2>
      <div class="hint">Esto representa cómo cada hotel podría insertar su propio iframe en su página.</div>
    </div>
    <nav>
      <button onclick="cargar('webreservas_aguila_dorada.html')">Águila Dorada</button>
      <button onclick="cargar('webreservas_inkarian.html')">Inkarian</button>
      <button onclick="cargar('webreservas_flora.html')">Flora</button>
    </nav>
  </header>
  <iframe id="visor" src="webreservas_aguila_dorada.html"></iframe>
  <script>
    function cargar(url){ document.getElementById('visor').src = url; }
  </script>
</body>
</html>
